# ===========================================
# Viyom Donation - Main Application Config
# ===========================================

# Active profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# Server - Render injects PORT automatically
server.port=${PORT:8080}
server.servlet.context-path=/viyom

# ===========================================
# DATABASE - Aiven MySQL
# Set SPRING_DATASOURCE_URL in Render environment variables as:
# jdbc:mysql://mysql-2694f66b-skillwallah11-b3ff.h.aivencloud.com:17538/defaultdb?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
# ===========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql-2694f66b-skillwallah11-b3ff.h.aivencloud.com:17538/defaultdb?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true&verifyServerCertificate=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:avnadmin}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool - conservative for Render free tier
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:viyomSuperSecretJWTKey2024XYZ987654321ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghij}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_SNXBJWvVtz8wkt}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:BEjq5csDnjaKGhiH2fxAiI2K}

# CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator health check for Render
# Health check paths (with context-path /viyom):
#   /viyom/actuator/health  <- set this in Render health check path
#   /viyom/api/health       <- custom health endpoint
#   /viyom/                 <- root (always returns 200)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.db.enabled=true

# Blockchain (optional - gracefully disabled if not configured)
blockchain.rpc.url=${BLOCKCHAIN_RPC_URL:https://rpc-amoy.polygon.technology}
blockchain.private.key=${BLOCKCHAIN_PRIVATE_KEY:}
blockchain.contract.address=${BLOCKCHAIN_CONTRACT_ADDRESS:}
blockchain.polygon.chain.id=${BLOCKCHAIN_CHAIN_ID:80002}
blockchain.gas.price=${BLOCKCHAIN_GAS_PRICE:30000000000}
blockchain.gas.limit=${BLOCKCHAIN_GAS_LIMIT:500000}

# Twilio (optional - gracefully disabled if not configured)
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM:}

# Logging
logging.level.root=WARN
logging.level.viyom.donation=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
