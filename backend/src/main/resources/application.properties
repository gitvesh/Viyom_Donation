# ===========================================
# Viyom Donation - Main Application Config
# Active profile driven by SPRING_PROFILES_ACTIVE env var
# Defaults to 'prod' on Render (set via environment variable)
# ===========================================

# Activate profile: set SPRING_PROFILES_ACTIVE=prod in Render env vars
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/viyom

# Database Configuration
# Set SPRING_DATASOURCE_URL in Render as full JDBC URL, e.g.:
# jdbc:mysql://host:port/dbname?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:viyom}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (Render free tier needs conservative settings)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKey12389012345gre5e54e5e4tedgf678901234567890}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_SNXBJWvVtz8wkt}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:BEjq5csDnjaKGhiH2fxAiI2K}

# CORS Configuration (set CORS_ALLOWED_ORIGINS in Render env vars)
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator (health check for Render)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Blockchain Configuration (optional - app works without it)
blockchain.rpc.url=${BLOCKCHAIN_RPC_URL:https://rpc-amoy.polygon.technology}
blockchain.private.key=${BLOCKCHAIN_PRIVATE_KEY:}
blockchain.contract.address=${BLOCKCHAIN_CONTRACT_ADDRESS:}
blockchain.polygon.chain.id=${BLOCKCHAIN_CHAIN_ID:80002}
blockchain.gas.price=${BLOCKCHAIN_GAS_PRICE:30000000000}
blockchain.gas.limit=${BLOCKCHAIN_GAS_LIMIT:500000}

# Twilio (optional - app works without it)
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM:}

# Logging (reduce noise on Render)
logging.level.root=WARN
logging.level.viyom.donation=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
