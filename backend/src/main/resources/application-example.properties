# Viyom Donation System - Application Properties Example
# Copy this file to application.properties and update with your actual values

# ===========================================
# SERVER CONFIGURATION
# ===========================================
server.port=8080
server.servlet.context-path=/viyom

# ===========================================
# DATABASE CONFIGURATION
# ===========================================
spring.datasource.url=jdbc:mysql://localhost:3306/viyom_db
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===========================================
# JWT CONFIGURATION
# ===========================================
jwt.secret=your_very_long_and_secure_jwt_secret_key_here
jwt.expiration=86400000

# ===========================================
# RAZORPAY CONFIGURATION
# ===========================================
razorpay.key.id=your_razorpay_key_id
razorpay.key.secret=your_razorpay_key_secret

# ===========================================
# CORS CONFIGURATION
# ===========================================
cors.allowed.origins=http://localhost:3000,http://localhost:3001

# ===========================================
# FILE UPLOAD CONFIGURATION
# ===========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===========================================
# BLOCKCHAIN CONFIGURATION
# ===========================================
# Polygon Amoy Testnet RPC URL
blockchain.rpc.url=https://rpc-amoy.polygon.technology

# Polygon Amoy Chain ID
blockchain.polygon.chain.id=80002

# Deployed smart contract address (DO NOT commit to version control)
blockchain.contract.address=

# Private key for blockchain transactions (DO NOT commit to version control)
# Use environment variable in production: BLOCKCHAIN_PRIVATE_KEY
blockchain.private.key=

# Gas configuration (optimized for Polygon Amoy)
blockchain.gas.price=20000000000
blockchain.gas.limit=6000000

# ===========================================
# PRODUCTION CONFIGURATION NOTES
# ===========================================
# 1. Never hardcode secrets in application.properties
# 2. Use environment variables for sensitive data:
#    - blockchain.private.key=${BLOCKCHAIN_PRIVATE_KEY}
#    - razorpay.key.secret=${RAZORPAY_SECRET}
#    - jwt.secret=${JWT_SECRET}
#    - spring.datasource.password=${DB_PASSWORD}
#
# 3. Environment variables example:
#    export BLOCKCHAIN_PRIVATE_KEY="your_private_key_without_0x_prefix"
#    export RAZORPAY_SECRET="your_razorpay_secret"
#    export JWT_SECRET="your_jwt_secret"
#    export DB_PASSWORD="your_database_password"
#
# 4. For production, use application-prod.properties with:
#    spring.profiles.active=prod
#
# 5. Security best practices:
#    - Store secrets in vault or environment variables
#    - Use different keys for different environments
#    - Rotate keys regularly
#    - Monitor for leaked credentials
